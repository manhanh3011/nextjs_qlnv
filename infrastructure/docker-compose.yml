services:
  postgres:
    image: postgres:16

    container_name: qlnv-postgres

    restart: always

    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: qlnv

    ports:
      - "5433:5432"

    volumes:
      - postgres_data:/var/lib/postgresql/data

  hasura:
    image: hasura/graphql-engine:v2.48.6

    container_name: qlnv-hasura

    restart: always

    depends_on:
      - postgres

    ports:
      - "8080:8080"

    environment:
      HASURA_GRAPHQL_DATABASE_URL: postgres://postgres:postgres@postgres:5432/qlnv

      HASURA_GRAPHQL_ENABLE_CONSOLE: "true"

      HASURA_GRAPHQL_DEV_MODE: "true"

      HASURA_GRAPHQL_ADMIN_SECRET: admin123

volumes:
  postgres_data: